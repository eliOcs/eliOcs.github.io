- job-title: Co-founder

  period:
    start: 1/3/2012
    end: 30/9/2013

  company:
    name: Kolobee - Interesting things nearby
    description: >
      In this first stage our startup Kolobee developed a location based social
      network. People collaborated in interest groups to locate things they
      liked on a map. For example a group could spot and locate: all the cool
      graffitis, the best vegan restaurants or the best fishing spots.

      We developed a working product for the web and iPhone in which more than
      1,000 users signed up but we failed to reach a critical mass of users for
      the product to add real value.

  experience:

    - title: CTO
      description: >
        During this stage we were 4 in our team, we had a frontend developer
        and a graphic designer working with us. We successfully managed to ship
        a high quality product with very little resources and time. But, we did
        fail to build a simple product (MVP) as we jammed the product with all
        the cool features we could imagine.

        One of the best decisions we took was to split the platform into
        multiple services. One that took part of the core business logic
        providing web services to use it (API) and two other parts: the web
        client and the iOS app. Another key decision to keep costs down was to
        use only one programming language in almost all parts of the
        development which greatly reduced context switching improving our
        efficiency.
      tools: [Agile development, SCRUM, Pivotal Tracker]

    - title: Backend developer
      description: >
        We thought out an architecture that would last and would be useful in
        the long run, the result was an stateless server that could easily be
        scaled. Offered a REST API to the web a mobile app clients to
        authenticate, upload content, chat and query content nearby.
      tools: [JavaScript, HTTP REST, Node.js, Restify, MongoDB, ImageMagick]

    - title: Frontend developer
      description: >
        Creating a dynamic web app that allowed users to upload images while
        interacting with a map to localize them proved to be a great learning
        experience.
      tools: [HTML, JavaScript, CSS, LESS, AJAX, Node.js, Express.js, Backbone, jQuery, Google Maps]

    - title: iOS developer
      description: >
        We built an app that could do all the functionalities we did for our
        web. User took pictures with the app and then image was uploaded with
        the current user location. A map showed all the content around and
        users could chat.
      tools: [Objective-C, Xcode, Core Location, Core Data, MapKit]


