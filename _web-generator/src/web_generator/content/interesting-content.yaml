  added: 22/8/2017
  url: https://www.amazon.com/Sapiens-Humankind-Yuval-Noah-Harari/dp/0062316095
  comment: >
    Having an overview of the human history is essential to understand why and
    how we reached to our present. Yuval explains how religion, economics and
    law are just myths we have inveted to be able to collaborate in large
