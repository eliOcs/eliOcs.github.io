- job-title: Co-founder

  period:
    start: 1/9/2014
    end: 31/7/2016

  company:
    name: Histories - Amazing historical facts near you
    description: >
      In our last startup pivot we developed an app that teaches you the history
      around you when walking around your neighbourhood, visiting a new place or
      if you're feeling curious while sitting on the couch.

      Our app was used by more than 20,000 users each month, included more than
      5,000 location based history articles of Spain and London and received an
      average rating of 4.5 out of 5 from 2,000 reviews.

      During this time we were granted with 50k€ and we managed to get 1% of the
      users to pay 6€ on average but we couldn't reach a large enough user base
      to create a profitable business.

  experience:

    - title: CTO
      description: >
        In this last stage we were 5 in the team although 2 of us were working
        full time on the content. During this stage our main focus was to take
        data driven approach when taking decisions. We measured user activity
        and behaviour to learn which features made sense and which could be
        discarded. We started to control our software quality with metrics too
        and published to production apps with 99.5% crash-free sessions.
      tools: [Agile development, SCRUM, Data-driven, Pivotal Tracker, Mixpanel, Crashlytics]

    - title: Backend developer
      description: >
        I extended our backend so it could persist the progress of the users in
        our new app. The architecture had to handle the requests of thousands of
        users (more than 100 request per second), we had no problem handling
        this load due to our scalable architecture.
      tools: [JavaScript, HTTP REST, Linux, NGINX, Node.js, Restify, MongoDB, Git]

    - title: iOS developer
      description: >
        Lots of the effort was dedicated to develop a low-battery consumption
        algorithm to unlock content as the user passed through certain
        locations.
      tools: [Swift, Xcode, Core Location, Core Data, MapKit, Git]

    - title: Android developer
      description: >
        Replicated the app developed in iPhone.
      tools: [Java, Android Studio, Google Play Services, Git]
- job-title: Co-founder

  period:
    start: 1/11/2013
    end: 31/8/2014

  company:
    name: Kolobee - Tourism apps
    description: >
      In our next pivot we created an app builder. This app builder was created
      to allow city councils and bloggers to easily createa apps that served as
      tourist guides. The user would create points on a map with photographs,
      descriptions, etc. and then an app would be created with that content
      automatically.

      Our most important milestones during this time were: to be granted with
      206k€ by the Spanish government, to release 50 apps with our app builder
      and to reach more than 40,000 users. Unfortunately we couldn't convert
      city councils into paying customers and therefore failed to achieve a
      successful business model.

  experience:

    - title: CTO
      description: >
        In this second stage we were 4 in our team we had a frontend developer
        and a graphic designer working with us. Thanks to our previous well
        thought out architecture we managed to reuse great part of our previous
        technology.

        We decided to develop our apps natively even though it meant duplicating
        the work because at the time no cross-platform development framework
        allowed us to achieve the product quality we desired.
      tools: [Agile development, SCRUM, Pivotal Tracker]

    - title: Backend developer
      description: >
        Created a script to automatically create mobile apps. It downloaded the
        content the user had uploaded, built an offline map and created the
        apps from the iOS and Android templates. It was a real challenge to
        compress the offline maps so they didn't take lots of space in the apps.
      tools: [Bash, OpenStreetMaps]

    - title: Frontend developer
      description: >
        Modified our previous web based CMS to allow users to fill the app
        information and create apps from their content.
      tools: [HTML, JavaScript, CSS, LESS, Angular, Git]

    - title: iOS developer
      description: >
        Created a template app from which all our apps would be generated. The
        app was used as a tourist guide, it contained an offline map with the
        points of interest and each point had images and text. Users could log
        using their Facebook accounts to share, like or comment the points of
        interest.
      tools: [Objective-C, Xcode, Core Location, Core Data, MapBox, Facebook SDK, Git]

    - title: Android developer
      description: >
        Replicated the template app that was done for iPhone in Android.
      tools: [Java, Android Studio, Google Play Services, MapBox, Facebook SDK]

- job-title: Co-founder

  period:
    start: 1/3/2012
    end: 30/9/2013

  company:
    name: Kolobee - Interesting things nearby
    description: >
      In this first stage our startup Kolobee we developed a location based
      social network. People collaborated in interest groups to locate things
      they liked on a map. For example a group could spot and locate: cool
      graffitis, vegan restaurants or fishing spots.

      We developed a working product for the web and iPhone in which more than
      1,000 users signed up but we failed to reach a critical mass of users for
      the product to generate real value.

  experience:

    - title: CTO
      description: >
        During this stage we were 4 in our team, we had a frontend developer and
        a graphic designer working with us. We successfully managed to ship a
        high quality product with very little resources and time. But, we did
        fail to build a simple product (MVP) as we jammed the product with all
        the cool features we could imagine.

        One of the best decisions we took was to split the platform into
        multiple services. One that took part of the core business logic
        providing web services to use it (API) and two other parts: the web
        client and the iOS app. Another key decision to keep costs down was to
        use only one programming language in almost all parts of the development
        which greatly reduced context switching improving our efficiency.
      tools: [Agile development, SCRUM, Pivotal Tracker]

    - title: Backend developer
      description: >
        Thought out an architecture that would last and would be useful in the
        long run, the result was an stateless server that could be easily
        scaled. Offered a REST API to the web a mobile app clients to
        authenticate, upload content, chat and query content nearby.
      tools: [JavaScript, HTTP REST, Linux, NGINX, Node.js, Restify, MongoDB, ImageMagick, Git]

    - title: Frontend developer
      description: >
        Created a dynamic web app that allowed users to upload images while
        interacting with a map to localize them which proved to be a great
        learning experience.
      tools: [HTML, JavaScript, CSS, LESS, AJAX, Node.js, Express, Bootstrap, Backbone, jQuery, Google Maps, Git]

    - title: iOS developer
      description: >
        Built an app that could do all the functionalities of our web. Users
        took pictures with the app and then the image was uploaded with the
        current user location. A map showed all the content around and users
        could chat with each other.
      images:
        - images/kolobee-stage-1/ios/collection-list.jpg
        - images/kolobee-stage-1/ios/map.jpg
        - images/kolobee-stage-1/ios/point-detail.jpg
        - images/kolobee-stage-1/ios/point-list.jpg
      tools: [Objective-C, Xcode, Core Location, Core Data, MapKit, Git]


